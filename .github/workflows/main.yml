name: Arista-hafez

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: faals.db
          key: faals-db-cache-v1
          restore-keys: |
            faals-db-cache-v1
            faals-db-cache-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Validate DB
        run: |
          if [ ! -f faals.db ] || [ ! -s faals.db ] || [ $(stat -c%s faals.db) -lt 1000 ]; then
            rm -f faals.db
          fi

      - run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
